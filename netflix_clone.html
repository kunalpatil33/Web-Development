<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:black;
    color:white;
}

.hero{
    width:100%;
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url("https://i.pinimg.com/1200x/a8/e3/62/a8e362c1e6ec4b40be24e2ae67bd9c4e.jpg");
    background-size:cover;
    background-position:center;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 80px;
}

.logo{
    color:red;
    font-size:42px;
    font-weight:bold;
}

.signin-btn{
    background:red;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.content{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.content h1{
    font-size:60px;
    margin-bottom:20px;
}

.content h3{
    font-size:25px;
    margin-bottom:20px;
}

.content p{
    margin-bottom:20px;
}

.email-box{
    display:flex;
    gap:10px;
}

.email-box input{
    width:350px;
    padding:15px;
    border:none;
    outline:none;
    border-radius:4px;
}

.email-box button{
    background:red;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:4px;
    cursor:pointer;
}

.signin-btn:hover,
.email-box button:hover{
    background:#cc0000;
}
</style>
</head>

<body>
<div class="hero">

    <div class="navbar">
        <div class="logo">NETFLIX</div>
        <button class="signin-btn">Sign In</button>
    </div>

    <div class="content">
        <h1>Unlimited Movies, TV Shows and More</h1>
        <h3>Starts at ₹150. cancle at any Time</h3>
        <p>Ready to watch? Enter your email to create or restart your membership.</p>

        <div class="email-box">
            <h2><input type="email" placeholder="Email Address"></h2>
            <button><h2>Get Started</h2></button>
        </div>
    </div>

</div>
</body>
</html>
